name: Deploy Backend

on:
  push:
    paths:
      - 'backend/**'

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: foremo-backend
  ECS_SERVICE: task-backend-service-ukuhoqcm
  ECS_CLUSTER: essential-cat-stu12j

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AKIA43DSRXRNZPWHOKW6 }}
          aws-secret-access-key: ${{ secrets.aUTe+a/vdYUhUnzX84W3wOY/n7pfAqZVfgq92bTO }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest ./backend
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

      - name: Deploy Backend
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment