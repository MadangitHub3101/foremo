server {
    listen 8080;
    server_name _;

    # ✅ This is where nginx looks for files
    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        return 200 'healthy';
        add_header Content-Type text/plain;
    }
}
